<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found · Amelia Krupnik</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --ink: #1a1814;
      --muted: #7a7670;
      --rule: #d8d4ce;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono: 'DM Mono', monospace;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--serif);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    .site-header {
      padding: 2.5rem 2.5rem 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .site-nav a {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .site-nav a:hover {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 6rem 2rem 5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.15s forwards;
    }

    .label {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .message {
      font-size: clamp(1.9rem, 4.5vw, 2.75rem);
      font-weight: 300;
      line-height: 1.25;
      color: var(--ink);
      margin-bottom: 2.5rem;
    }

    .home-link {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--ink);
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      transition: opacity 0.2s;
    }

    .home-link:hover { opacity: 0.75; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .site-header { padding: 2rem 1.5rem 0; flex-direction: column; gap: 1.25rem; }
      .site-nav { gap: 1.25rem; }
      .page { padding: 4rem 1.5rem 4rem; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="wordmark" href="/">Amelia Krupnik</a>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/about">About</a>
    </nav>
  </header>

  <div class="page">
    <p class="label">404</p>
    <p class="message">This page doesn't exist.</p>
    <a class="home-link" href="/">Back to home</a>
  </div>

</body>
</html>
